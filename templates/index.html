<!DOCTYPE html>
<html>

<head>

<title>Lakmé Price Intelligence</title>

<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

/* MAIN CARD */

.container{

width:420px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
padding:35px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

/* TITLE */

h2{
margin-bottom:20px;
color:#333;
}

/* INPUTS */

input,select{

width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
background:#f3f4f6;
font-size:14px;
}

/* SEARCH */

#searchBox{
background:#fff;
border:1px solid #ddd;
}

/* BUTTON */

button{

width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#ff5f6d,#ffc371);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{

transform:scale(1.03);
box-shadow:0 5px 15px rgba(0,0,0,0.2);

}

/* DASHBOARD LINK */

a{

display:inline-block;
margin-top:15px;
text-decoration:none;
font-weight:500;
color:#444;

}

a:hover{
color:#ff4d6d;
}

</style>

</head>


<body>

<div class="container">

<h2>✨ Lakmé Price Intelligence</h2>

<input type="text" id="searchBox" placeholder="🔍 Search Product">

<form action="/predict" method="post">

<select name="product_id" id="productSelect" required>

<option value="">Select Product</option>

{% for product in products %}

<option value="{{ product['ProductID'] }}">
{{ product['ProductName'] }} - ₹{{ product['MRP'] }}
</option>

{% endfor %}

</select>

<input id="discount" placeholder="Discount %" readonly>

<input id="gst" placeholder="GST %" readonly>

<button type="submit">🚀 Generate Smart Price</button>

</form>

<a href="/dashboard">📊 View Dashboard</a>

</div>


<script id="product-data" type="application/json">
{{ products | tojson }}
</script>

<script>

const products =
JSON.parse(document.getElementById("product-data").textContent)

document.getElementById("productSelect")
.addEventListener("change",function(){

let id=parseInt(this.value)

let p=products.find(x=>x.ProductID===id)

if(p){
discount.value=p.Discount
gst.value=p.GST
}

})


const searchBox=document.getElementById("searchBox")
const select=document.getElementById("productSelect")

searchBox.addEventListener("keyup",function(){

let filter=searchBox.value.toLowerCase()

for(let option of select.options){

let text=option.text.toLowerCase()

option.style.display = text.includes(filter) ? "" : "none"

}

})

</script>

</body>
</html>
