<!DOCTYPE html>
<html>

<head>

<title>Lakmé Pricing Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
padding:40px;
color:white;
}

/* TITLE */

h2{
text-align:center;
margin-bottom:10px;
}

/* PREMIUM PRODUCT */

.top-product{
text-align:center;
background:rgba(255,255,255,0.15);
padding:12px;
border-radius:10px;
margin-bottom:25px;
font-weight:500;
}

/* GRID LAYOUT */

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
gap:25px;

}

/* CHART CARD */

.card{

background:rgba(255,255,255,0.9);
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
color:black;

}

/* CANVAS */

canvas{
width:100% !important;
height:300px !important;
}

/* BUTTONS */

.links{
text-align:center;
margin-top:25px;
}

.links a{

text-decoration:none;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
color:white;
padding:10px 18px;
margin:5px;
border-radius:8px;
display:inline-block;
transition:0.3s;

}

.links a:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

</style>

</head>


<body>

<h2>📊 Lakmé Pricing Analytics Dashboard</h2>

<div class="top-product">
🔥 Top Premium Product: <b>{{ top_product }}</b>
</div>


<div class="grid">

<div class="card">
<h3>MRP vs AI Price</h3>
<canvas id="priceChart"></canvas>
</div>

<div class="card">
<h3>Profit Analysis</h3>
<canvas id="profitChart"></canvas>
</div>

<div class="card">
<h3>Discount Distribution</h3>
<canvas id="discountChart"></canvas>
</div>

<div class="card">
<h3>Demand Score</h3>
<canvas id="demandChart"></canvas>
</div>

</div>


<div class="links">

<a href="/">⬅ Back to Home</a>

<a href="/download">📥 Download Report</a>

</div>


<script id="chart-data" type="application/json">

{
"labels": {{ labels | tojson }},
"mrp": {{ mrp | tojson }},
"final": {{ final | tojson }},
"profit": {{ profit | tojson }},
"discount": {{ discount | tojson }},
"demand": {{ demand | tojson }}
}

</script>


<script>

const data =
JSON.parse(document.getElementById("chart-data").textContent)

const labels=data.labels


new Chart(document.getElementById("priceChart"),{

type:"bar",

data:{
labels:labels,
datasets:[
{label:"MRP",data:data.mrp,backgroundColor:"#ff7675"},
{label:"AI Price",data:data.final,backgroundColor:"#55efc4"}
]

}

})


new Chart(document.getElementById("profitChart"),{

type:"line",

data:{
labels:labels,
datasets:[
{label:"Profit",data:data.profit,borderColor:"#6c5ce7",fill:false}
]

}

})


new Chart(document.getElementById("discountChart"),{

type:"pie",

data:{
labels:labels,
datasets:[
{data:data.discount}
]

}

})


new Chart(document.getElementById("demandChart"),{

type:"radar",

data:{
labels:labels,
datasets:[
{label:"Demand Score",data:data.demand}
]

}

})

</script>

</body>
</html>
